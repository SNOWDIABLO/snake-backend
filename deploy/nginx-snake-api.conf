# /etc/nginx/sites-available/snake-backend
#
# Place this file at /etc/nginx/sites-available/snake-backend on the VPS,
# then enable it:
#   sudo ln -s /etc/nginx/sites-available/snake-backend /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Replace SUBDOMAIN_PLACEHOLDER with the actual hostname before running certbot.

# Rate-limit zones — declare in nginx.conf http{} block, or here if not already there.
# limit_req_zone $binary_remote_addr zone=snake_api:10m rate=20r/s;

server {
    listen 80;
    listen [::]:80;
    server_name SUBDOMAIN_PLACEHOLDER;

    # certbot --nginx will inject the 443 block + cert paths. Keep this 80 block
    # for ACME challenges and HTTP→HTTPS redirect (also auto-handled by certbot).

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name SUBDOMAIN_PLACEHOLDER;

    # certbot fills these:
    # ssl_certificate /etc/letsencrypt/live/SUBDOMAIN_PLACEHOLDER/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/SUBDOMAIN_PLACEHOLDER/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 5m;

    # Optional rate-limit at the edge (server.js already has express-rate-limit)
    # limit_req zone=snake_api burst=40 nodelay;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (ws lib used in server.js)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Healthcheck without rate-limit noise
    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }
}
