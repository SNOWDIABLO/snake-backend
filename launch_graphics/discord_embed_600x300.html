<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>$SNAKE Discord Embed 600x300</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;800;900&family=JetBrains+Mono:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 600px;
    height: 300px;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Inter', sans-serif;
    color: #fff;
  }

  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(0, 255, 136, 0.25) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 50%, rgba(138, 69, 239, 0.3) 0%, transparent 55%),
      linear-gradient(135deg, #0a0a0f 0%, #111827 100%);
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(138, 69, 239, 0.1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(138, 69, 239, 0.1) 1px, transparent 1px);
    background-size: 30px 30px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 40px;
    gap: 24px;
  }

  .snake-svg {
    width: 110px;
    height: 110px;
    filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.6));
    flex-shrink: 0;
  }

  .content { flex: 1; }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(0, 255, 136, 0.15);
    border: 1.5px solid #00ff88;
    padding: 4px 12px;
    border-radius: 100px;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: #00ff88;
    margin-bottom: 10px;
  }
  .live-dot {
    width: 6px; height: 6px;
    background: #00ff88;
    border-radius: 50%;
    box-shadow: 0 0 10px #00ff88;
  }

  h1 {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
    background: linear-gradient(135deg, #00ff88 0%, #8a45ef 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 16px;
    font-weight: 600;
    color: #cbd5e1;
    margin-bottom: 14px;
  }

  .cta {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: #00ff88;
    padding: 8px 18px;
    background: rgba(0, 255, 136, 0.1);
    border: 1.5px solid rgba(0, 255, 136, 0.5);
    border-radius: 8px;
  }
  .cta::before { content: '▶ '; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>

  <div class="container">
    <svg class="snake-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="snakeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#00ff88"/>
          <stop offset="100%" stop-color="#00b366"/>
        </linearGradient>
      </defs>
      <rect x="10" y="40" width="14" height="14" rx="2" fill="url(#snakeGrad3)"/>
      <rect x="26" y="40" width="14" height="14" rx="2" fill="url(#snakeGrad3)"/>
      <rect x="42" y="40" width="14" height="14" rx="2" fill="url(#snakeGrad3)"/>
      <rect x="42" y="56" width="14" height="14" rx="2" fill="url(#snakeGrad3)"/>
      <rect x="42" y="72" width="14" height="14" rx="2" fill="url(#snakeGrad3)"/>
      <rect x="58" y="72" width="14" height="14" rx="2" fill="url(#snakeGrad3)"/>
      <rect x="74" y="72" width="16" height="14" rx="3" fill="url(#snakeGrad3)" stroke="#fff" stroke-width="1"/>
      <circle cx="82" cy="76" r="1.5" fill="#0a0a0f"/>
      <circle cx="86" cy="76" r="1.5" fill="#0a0a0f"/>
      <circle cx="17" cy="18" r="4" fill="#ff3366" />
    </svg>

    <div class="content">
      <div class="live-badge">
        <span class="live-dot"></span>
        LIVE ON POLYGON
      </div>
      <h1>$SNAKE</h1>
      <p class="subtitle">Pure skill P2E snake. Play → earn.</p>
      <div class="cta">Click to play</div>
    </div>
  </div>
</body>
</html>
