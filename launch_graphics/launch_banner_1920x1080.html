<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>$SNAKE Launch Banner 1920x1080</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Inter', sans-serif;
    color: #fff;
  }

  /* Background gradient + grid */
  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 25% 40%, rgba(138, 69, 239, 0.35) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 60%, rgba(0, 255, 136, 0.25) 0%, transparent 55%),
      linear-gradient(135deg, #0a0a0f 0%, #111827 100%);
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(138, 69, 239, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(138, 69, 239, 0.08) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
  }

  /* LIVE badge */
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: rgba(0, 255, 136, 0.12);
    border: 2px solid #00ff88;
    padding: 14px 36px;
    border-radius: 100px;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: 3px;
    color: #00ff88;
    margin-bottom: 50px;
    box-shadow: 0 0 40px rgba(0, 255, 136, 0.3);
  }
  .live-dot {
    width: 14px; height: 14px;
    background: #00ff88;
    border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
    box-shadow: 0 0 20px #00ff88;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.3); }
  }

  /* Logo + Title */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 40px;
    margin-bottom: 30px;
  }
  .snake-svg {
    width: 180px;
    height: 180px;
    filter: drop-shadow(0 0 30px rgba(0, 255, 136, 0.6));
  }

  h1 {
    font-size: 180px;
    font-weight: 900;
    letter-spacing: -6px;
    line-height: 1;
    background: linear-gradient(135deg, #00ff88 0%, #8a45ef 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 80px rgba(0, 255, 136, 0.3);
  }

  .subtitle {
    font-size: 42px;
    font-weight: 600;
    color: #94a3b8;
    margin-bottom: 50px;
    letter-spacing: 1px;
  }
  .subtitle strong {
    color: #fff;
    font-weight: 800;
  }

  /* Features row */
  .features {
    display: flex;
    gap: 30px;
    margin-bottom: 60px;
  }
  .feature {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(138, 69, 239, 0.3);
    border-radius: 20px;
    padding: 22px 36px;
    font-size: 26px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .feature .icon {
    font-size: 34px;
  }

  /* URL footer */
  .url {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 48px;
    font-weight: 700;
    color: #00ff88;
    letter-spacing: -1px;
    padding: 24px 48px;
    background: rgba(0, 255, 136, 0.08);
    border: 2px solid rgba(0, 255, 136, 0.4);
    border-radius: 16px;
  }
  .url::before {
    content: '▶';
    color: #00ff88;
    font-size: 36px;
  }

  /* Polygon badge corner */
  .polygon-badge {
    position: absolute;
    top: 50px;
    right: 50px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 24px;
    font-weight: 700;
    color: #8a45ef;
    background: rgba(138, 69, 239, 0.12);
    border: 1px solid rgba(138, 69, 239, 0.4);
    padding: 14px 28px;
    border-radius: 100px;
  }
  .polygon-badge::before {
    content: '';
    width: 24px; height: 24px;
    background: #8a45ef;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }

  /* Dev credit corner */
  .credit {
    position: absolute;
    bottom: 40px;
    right: 50px;
    font-size: 20px;
    color: #64748b;
    font-weight: 500;
  }
  .credit strong { color: #cbd5e1; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>

  <div class="polygon-badge">POLYGON MAINNET</div>

  <div class="container">
    <div class="live-badge">
      <span class="live-dot"></span>
      GAME IS LIVE
    </div>

    <div class="logo-row">
      <svg class="snake-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="snakeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ff88"/>
            <stop offset="100%" stop-color="#00b366"/>
          </linearGradient>
        </defs>
        <!-- Snake body segments -->
        <rect x="10" y="40" width="14" height="14" rx="2" fill="url(#snakeGrad)"/>
        <rect x="26" y="40" width="14" height="14" rx="2" fill="url(#snakeGrad)"/>
        <rect x="42" y="40" width="14" height="14" rx="2" fill="url(#snakeGrad)"/>
        <rect x="42" y="56" width="14" height="14" rx="2" fill="url(#snakeGrad)"/>
        <rect x="42" y="72" width="14" height="14" rx="2" fill="url(#snakeGrad)"/>
        <rect x="58" y="72" width="14" height="14" rx="2" fill="url(#snakeGrad)"/>
        <!-- Snake head -->
        <rect x="74" y="72" width="16" height="14" rx="3" fill="url(#snakeGrad)" stroke="#fff" stroke-width="1"/>
        <circle cx="82" cy="76" r="1.5" fill="#0a0a0f"/>
        <circle cx="86" cy="76" r="1.5" fill="#0a0a0f"/>
        <!-- Food dot -->
        <circle cx="17" cy="18" r="4" fill="#ff3366" />
      </svg>
      <h1>$SNAKE</h1>
    </div>

    <p class="subtitle">Pure skill P2E. <strong>10 pts = 1 $SNAKE on-chain.</strong></p>

    <div class="features">
      <div class="feature"><span class="icon">🏆</span>NFT Trophies</div>
      <div class="feature"><span class="icon">⚡</span>Boost Marketplace</div>
      <div class="feature"><span class="icon">⏱️</span>24h Tournaments</div>
      <div class="feature"><span class="icon">⚔️</span>Clans</div>
    </div>

    <div class="url">snowdiablo.xyz</div>
  </div>

  <div class="credit">Built solo by <strong>@SnowDiablo</strong></div>
</body>
</html>
