<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>$SNAKE Twitter Header 1500x500</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;800;900&family=JetBrains+Mono:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1500px;
    height: 500px;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Inter', sans-serif;
    color: #fff;
  }

  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0, 255, 136, 0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, rgba(138, 69, 239, 0.35) 0%, transparent 55%),
      linear-gradient(135deg, #0a0a0f 0%, #111827 100%);
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(138, 69, 239, 0.1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(138, 69, 239, 0.1) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 100px;
    gap: 60px;
  }

  .snake-svg {
    width: 220px;
    height: 220px;
    filter: drop-shadow(0 0 40px rgba(0, 255, 136, 0.6));
    flex-shrink: 0;
  }

  .content {
    flex: 1;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(0, 255, 136, 0.12);
    border: 1.5px solid #00ff88;
    padding: 8px 20px;
    border-radius: 100px;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 2px;
    color: #00ff88;
    margin-bottom: 18px;
  }
  .live-dot {
    width: 9px; height: 9px;
    background: #00ff88;
    border-radius: 50%;
    box-shadow: 0 0 14px #00ff88;
  }

  h1 {
    font-size: 120px;
    font-weight: 900;
    letter-spacing: -4px;
    line-height: 1;
    background: linear-gradient(135deg, #00ff88 0%, #8a45ef 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 12px;
  }

  .subtitle {
    font-size: 30px;
    font-weight: 600;
    color: #cbd5e1;
    margin-bottom: 20px;
  }
  .subtitle strong { color: #00ff88; }

  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: #00ff88;
  }
  .url::before { content: '▶ '; }

  /* Keep profile avatar safe zone clear (bottom-left 400x400 circle) */
  /* Nothing critical in that area */
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>

  <div class="container">
    <svg class="snake-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="snakeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#00ff88"/>
          <stop offset="100%" stop-color="#00b366"/>
        </linearGradient>
      </defs>
      <rect x="10" y="40" width="14" height="14" rx="2" fill="url(#snakeGrad2)"/>
      <rect x="26" y="40" width="14" height="14" rx="2" fill="url(#snakeGrad2)"/>
      <rect x="42" y="40" width="14" height="14" rx="2" fill="url(#snakeGrad2)"/>
      <rect x="42" y="56" width="14" height="14" rx="2" fill="url(#snakeGrad2)"/>
      <rect x="42" y="72" width="14" height="14" rx="2" fill="url(#snakeGrad2)"/>
      <rect x="58" y="72" width="14" height="14" rx="2" fill="url(#snakeGrad2)"/>
      <rect x="74" y="72" width="16" height="14" rx="3" fill="url(#snakeGrad2)" stroke="#fff" stroke-width="1"/>
      <circle cx="82" cy="76" r="1.5" fill="#0a0a0f"/>
      <circle cx="86" cy="76" r="1.5" fill="#0a0a0f"/>
      <circle cx="17" cy="18" r="4" fill="#ff3366" />
    </svg>

    <div class="content">
      <div class="live-badge">
        <span class="live-dot"></span>
        GAME IS LIVE • POLYGON
      </div>
      <h1>$SNAKE</h1>
      <p class="subtitle">Pure skill P2E. <strong>Play → earn on-chain.</strong></p>
      <div class="url">snowdiablo.xyz</div>
    </div>
  </div>
</body>
</html>
